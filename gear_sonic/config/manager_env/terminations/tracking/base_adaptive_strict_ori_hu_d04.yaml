# HU_D04 termination composition with all five terms active.
# foot_pos_xyz + ee_body_pos re-enabled at v1 default thresholds to see if the
# improved 3-segment retargeting data keeps per-body errors under them.

defaults:
  - terms/anchor_pos_adaptive@_here_
  - terms/anchor_ori_full@_here_
  - terms/ee_body_pos_adaptive@_here_
  - terms/motion_time_out@_here_
  - terms/foot_pos_xyz@_here_

_target_: gear_sonic.envs.manager_env.mdp.terminations.TerminationsCfg

anchor_pos:
  params:
    threshold: 0.30

ee_body_pos:
  params:
    threshold: 0.50
    body_names:
      - "left_ankle_roll_link"
      - "right_ankle_roll_link"
      - "left_wrist_roll_link"
      - "right_wrist_roll_link"

anchor_ori_full:
  params:
    threshold: 0.7  # squared → trigger at 48°

foot_pos_xyz:
  params:
    threshold: 0.50
